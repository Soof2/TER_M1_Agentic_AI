services:
  # Mode monolithique : API REST + LangGraph dans un seul runtime Python.
  sma-api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --workers 1
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=groq
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped

  # Interface graphique — NiceGUI.
  sma-ui:
    build: .
    command: python -m src.ui.app
    depends_on:
      - sma-api
    environment:
      - API_URL=http://sma-api:8000
      - UI_HOST=0.0.0.0
      - UI_PORT=8080
    ports:
      - "${UI_PORT_HOST:-8080}:8080"
    restart: unless-stopped

  # Mode CLI interactif monolithique (optionnel).
  sma-cli:
    build: .
    profiles:
      - cli
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=groq
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    stdin_open: true
    tty: true
